<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 830" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1B4F72"/>
      <stop offset="100%" stop-color="#2E86C1"/>
    </linearGradient>
    <linearGradient id="azureGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#005A9E"/>
    </linearGradient>
    <linearGradient id="acrGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00BCF2"/>
      <stop offset="100%" stop-color="#0078D4"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E86C1"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27AE60"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E67E22"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00BCF2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="830" rx="12" fill="#f5f7fa"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="1100" height="56" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="30" width="1100" height="26" fill="url(#headerGrad)"/>
  <text x="550" y="35" text-anchor="middle" fill="white" font-size="20" font-weight="700">SmartClaims AI Agent — Deployment Architecture</text>

  <!-- ===================== AZURE CONTAINER APP BOX ===================== -->
  <rect x="30" y="75" width="1040" height="740" rx="10" fill="none" stroke="#0078D4" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="30" y="75" width="250" height="28" rx="6" fill="url(#azureGrad)"/>
  <text x="155" y="94" text-anchor="middle" fill="white" font-size="12" font-weight="600">Azure Container App</text>

  <!-- ===================== LAYER 1: CLIENT (BROWSER) ===================== -->
  <rect x="60" y="120" width="300" height="130" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="60" y="120" width="300" height="32" rx="10" fill="#2E86C1"/>
  <rect x="60" y="140" width="300" height="12" fill="#2E86C1"/>
  <text x="210" y="141" text-anchor="middle" fill="white" font-size="13" font-weight="600">Browser — index.html</text>
  <text x="80" y="174" fill="#333" font-size="11">- File Upload (CSV, MD, TXT)</text>
  <text x="80" y="192" fill="#333" font-size="11">- 4 Tab Chat UI (Chat, Policy, Analytics, Tools)</text>
  <text x="80" y="210" fill="#333" font-size="11">- Chart.js Visualizations</text>
  <text x="80" y="228" fill="#333" font-size="11">- Quick Action Buttons</text>

  <!-- ===================== LAYER 2: ACR + DOCKERFILE ===================== -->
  <rect x="420" y="120" width="240" height="130" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="420" y="120" width="240" height="32" rx="10" fill="#00BCF2"/>
  <rect x="420" y="140" width="240" height="12" fill="#00BCF2"/>
  <text x="540" y="141" text-anchor="middle" fill="white" font-size="13" font-weight="600">Dockerfile</text>
  <text x="440" y="174" fill="#333" font-size="11">FROM python:3.11-slim</text>
  <text x="440" y="194" fill="#333" font-size="11">RUN pip install -r requirements.txt</text>
  <text x="440" y="214" fill="#555" font-size="10">CMD gunicorn + UvicornWorker</text>
  <text x="440" y="230" fill="#555" font-size="10">EXPOSE 8000</text>
  <text x="440" y="246" fill="#555" font-size="10">--timeout 120</text>

  <!-- ===================== LAYER 2: ENV ===================== -->
  <rect x="720" y="120" width="200" height="130" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="720" y="120" width="200" height="32" rx="10" fill="#8E44AD"/>
  <rect x="720" y="140" width="200" height="12" fill="#8E44AD"/>
  <text x="820" y="141" text-anchor="middle" fill="white" font-size="13" font-weight="600">Container App Secrets</text>
  <text x="740" y="174" fill="#333" font-size="11">PROJECT_ENDPOINT</text>
  <text x="740" y="194" fill="#333" font-size="11">MODEL_DEPLOYMENT_NAME</text>
  <text x="740" y="214" fill="#333" font-size="11">Managed Identity</text>
  <text x="740" y="234" fill="#555" font-size="10">(DefaultAzureCredential)</text>

  <!-- Arrow: Dockerfile -> FastAPI -->
  <line x1="540" y1="250" x2="540" y2="288" stroke="#00BCF2" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <text x="548" y="274" fill="#00BCF2" font-size="9" font-weight="600">builds image</text>

  <!-- ===================== LAYER 3: FASTAPI (main.py) ===================== -->
  <rect x="60" y="290" width="860" height="140" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="60" y="290" width="860" height="32" rx="10" fill="#E74C3C"/>
  <rect x="60" y="310" width="860" height="12" fill="#E74C3C"/>
  <text x="490" y="311" text-anchor="middle" fill="white" font-size="14" font-weight="700">main.py — FastAPI Application</text>

  <!-- Route boxes inside FastAPI -->
  <rect x="80" y="338" width="130" height="40" rx="6" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="145" y="355" text-anchor="middle" fill="#C0392B" font-size="10" font-weight="600">GET /</text>
  <text x="145" y="370" text-anchor="middle" fill="#777" font-size="9">Serve UI</text>

  <rect x="225" y="338" width="130" height="40" rx="6" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="290" y="355" text-anchor="middle" fill="#C0392B" font-size="10" font-weight="600">POST /api/upload</text>
  <text x="290" y="370" text-anchor="middle" fill="#777" font-size="9">File Upload</text>

  <rect x="370" y="338" width="130" height="40" rx="6" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="435" y="355" text-anchor="middle" fill="#C0392B" font-size="10" font-weight="600">POST /api/chat</text>
  <text x="435" y="370" text-anchor="middle" fill="#777" font-size="9">General Chat</text>

  <rect x="515" y="338" width="130" height="40" rx="6" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="580" y="355" text-anchor="middle" fill="#C0392B" font-size="10" font-weight="600">POST /api/policy-qa</text>
  <text x="580" y="370" text-anchor="middle" fill="#777" font-size="9">Policy Q&amp;A</text>

  <rect x="660" y="338" width="130" height="40" rx="6" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="725" y="355" text-anchor="middle" fill="#C0392B" font-size="10" font-weight="600">POST /api/analytics</text>
  <text x="725" y="370" text-anchor="middle" fill="#777" font-size="9">Analytics + Charts</text>

  <rect x="80" y="385" width="130" height="40" rx="6" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="145" y="402" text-anchor="middle" fill="#C0392B" font-size="10" font-weight="600">POST /api/fraud-risk</text>
  <text x="145" y="417" text-anchor="middle" fill="#777" font-size="9">Fraud Scoring</text>

  <rect x="225" y="385" width="130" height="40" rx="6" fill="#FDEDEC" stroke="#E74C3C" stroke-width="1"/>
  <text x="290" y="402" text-anchor="middle" fill="#C0392B" font-size="10" font-weight="600">POST /api/claim-lookup</text>
  <text x="290" y="417" text-anchor="middle" fill="#777" font-size="9">Claim Status</text>

  <!-- Pydantic Models label -->
  <text x="500" y="412" fill="#999" font-size="10" font-style="italic">Pydantic: ChatRequest, FraudRequest, ClaimLookup</text>

  <!-- Arrow: Browser -> FastAPI -->
  <line x1="210" y1="250" x2="210" y2="288" stroke="#2E86C1" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="218" y="274" fill="#2E86C1" font-size="9" font-weight="600">HTTPS requests</text>

  <!-- Arrow: Secrets -> AgentService -->
  <path d="M 820 250 L 820 498 L 790 498" stroke="#8E44AD" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="828" y="400" fill="#8E44AD" font-size="9" font-weight="600" transform="rotate(90,828,400)">config</text>

  <!-- ===================== LAYER 4: AGENT SERVICE ===================== -->
  <rect x="60" y="460" width="730" height="160" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="60" y="460" width="730" height="32" rx="10" fill="#F39C12"/>
  <rect x="60" y="480" width="730" height="12" fill="#F39C12"/>
  <text x="425" y="481" text-anchor="middle" fill="white" font-size="14" font-weight="700">agent_service.py — AgentService Class</text>

  <!-- Sub-blocks -->
  <rect x="80" y="505" width="155" height="50" rx="6" fill="#FEF9E7" stroke="#F39C12" stroke-width="1"/>
  <text x="157" y="525" text-anchor="middle" fill="#7D6608" font-size="10" font-weight="600">upload_files()</text>
  <text x="157" y="542" text-anchor="middle" fill="#888" font-size="9">CSV + Doc ingestion</text>

  <rect x="250" y="505" width="155" height="50" rx="6" fill="#FEF9E7" stroke="#F39C12" stroke-width="1"/>
  <text x="327" y="525" text-anchor="middle" fill="#7D6608" font-size="10" font-weight="600">chat()</text>
  <text x="327" y="542" text-anchor="middle" fill="#888" font-size="9">Function call loop</text>

  <rect x="420" y="505" width="155" height="50" rx="6" fill="#FEF9E7" stroke="#F39C12" stroke-width="1"/>
  <text x="497" y="525" text-anchor="middle" fill="#7D6608" font-size="10" font-weight="600">analytics_chat()</text>
  <text x="497" y="542" text-anchor="middle" fill="#888" font-size="9">Pre-aggregate + Chart</text>

  <rect x="590" y="505" width="180" height="50" rx="6" fill="#FEF9E7" stroke="#F39C12" stroke-width="1"/>
  <text x="680" y="525" text-anchor="middle" fill="#7D6608" font-size="10" font-weight="600">_create_agent()</text>
  <text x="680" y="542" text-anchor="middle" fill="#888" font-size="9">Tools: CodeInterp + FileSearch</text>

  <!-- Custom functions row -->
  <rect x="80" y="565" width="155" height="45" rx="6" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1"/>
  <text x="157" y="583" text-anchor="middle" fill="#1B4F72" font-size="10" font-weight="600">get_claim_status()</text>
  <text x="157" y="598" text-anchor="middle" fill="#888" font-size="9">CSV row lookup</text>

  <rect x="250" y="565" width="155" height="45" rx="6" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1"/>
  <text x="327" y="583" text-anchor="middle" fill="#1B4F72" font-size="10" font-weight="600">calculate_fraud_risk()</text>
  <text x="327" y="598" text-anchor="middle" fill="#888" font-size="9">Rule-based scoring</text>

  <rect x="420" y="565" width="155" height="45" rx="6" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1"/>
  <text x="497" y="583" text-anchor="middle" fill="#1B4F72" font-size="10" font-weight="600">_save_chart_png()</text>
  <text x="497" y="598" text-anchor="middle" fill="#888" font-size="9">Matplotlib → outputs/</text>

  <!-- Arrow: FastAPI -> AgentService -->
  <line x1="425" y1="430" x2="425" y2="458" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="433" y="449" fill="#555" font-size="9" font-weight="600">delegates</text>

  <!-- ===================== LAYER 5: AZURE AI FOUNDRY ===================== -->
  <rect x="60" y="650" width="730" height="100" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="60" y="650" width="730" height="32" rx="10" fill="url(#azureGrad)"/>
  <text x="425" y="672" text-anchor="middle" fill="white" font-size="14" font-weight="700">Azure AI Foundry (Cloud)</text>

  <!-- Sub-blocks -->
  <rect x="80" y="695" width="140" height="40" rx="6" fill="#D6EAF8" stroke="#2E86C1" stroke-width="1"/>
  <text x="150" y="713" text-anchor="middle" fill="#1B4F72" font-size="10" font-weight="600">AIProjectClient</text>
  <text x="150" y="727" text-anchor="middle" fill="#888" font-size="9">Agent CRUD</text>

  <rect x="240" y="695" width="140" height="40" rx="6" fill="#D6EAF8" stroke="#2E86C1" stroke-width="1"/>
  <text x="310" y="713" text-anchor="middle" fill="#1B4F72" font-size="10" font-weight="600">GPT-4o-mini</text>
  <text x="310" y="727" text-anchor="middle" fill="#888" font-size="9">LLM Responses</text>

  <rect x="400" y="695" width="140" height="40" rx="6" fill="#D6EAF8" stroke="#2E86C1" stroke-width="1"/>
  <text x="470" y="713" text-anchor="middle" fill="#1B4F72" font-size="10" font-weight="600">Vector Store</text>
  <text x="470" y="727" text-anchor="middle" fill="#888" font-size="9">Policy Doc Search</text>

  <rect x="560" y="695" width="140" height="40" rx="6" fill="#D6EAF8" stroke="#2E86C1" stroke-width="1"/>
  <text x="630" y="713" text-anchor="middle" fill="#1B4F72" font-size="10" font-weight="600">Code Interpreter</text>
  <text x="630" y="727" text-anchor="middle" fill="#888" font-size="9">CSV Analytics</text>

  <!-- Arrow: AgentService -> Azure Foundry -->
  <line x1="425" y1="620" x2="425" y2="648" stroke="#0078D4" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="433" y="639" fill="#0078D4" font-size="9" font-weight="600">SDK calls</text>

  <!-- ===================== RIGHT SIDE: CONTAINER INFRA ===================== -->
  <rect x="830" y="290" width="210" height="160" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="830" y="290" width="210" height="32" rx="10" fill="#00BCF2"/>
  <rect x="830" y="310" width="210" height="12" fill="#00BCF2"/>
  <text x="935" y="311" text-anchor="middle" fill="white" font-size="13" font-weight="600">Container Infrastructure</text>

  <text x="850" y="345" fill="#333" font-size="11" font-weight="600">Azure Container Registry</text>
  <text x="862" y="362" fill="#666" font-size="10">az acr build (cloud build)</text>
  <text x="862" y="377" fill="#666" font-size="10">python:3.11-slim base</text>

  <text x="850" y="402" fill="#333" font-size="11" font-weight="600">Container App Settings</text>
  <text x="862" y="419" fill="#666" font-size="10">Scale: 0-1 replicas</text>
  <text x="862" y="434" fill="#666" font-size="10">HTTPS auto TLS</text>

  <!-- ===================== RIGHT SIDE: DATA FLOW ===================== -->
  <rect x="830" y="470" width="210" height="300" rx="10" fill="white" filter="url(#shadow)"/>
  <rect x="830" y="470" width="210" height="32" rx="10" fill="#27AE60"/>
  <rect x="830" y="490" width="210" height="12" fill="#27AE60"/>
  <text x="935" y="491" text-anchor="middle" fill="white" font-size="13" font-weight="600">Data Flow</text>

  <!-- Data flow items -->
  <text x="850" y="525" fill="#333" font-size="11" font-weight="600">1. User uploads files</text>
  <text x="862" y="542" fill="#666" font-size="10">CSV → in-memory claims_data</text>
  <text x="862" y="557" fill="#666" font-size="10">MD/TXT → Vector Store</text>

  <text x="850" y="582" fill="#333" font-size="11" font-weight="600">2. Agent created</text>
  <text x="862" y="599" fill="#666" font-size="10">Tools: CodeInterp + FileSearch</text>
  <text x="862" y="614" fill="#666" font-size="10">+ Custom Functions</text>

  <text x="850" y="639" fill="#333" font-size="11" font-weight="600">3. User sends message</text>
  <text x="862" y="656" fill="#666" font-size="10">Route → AgentService.chat()</text>

  <text x="850" y="681" fill="#333" font-size="11" font-weight="600">4. Function call loop</text>
  <text x="862" y="698" fill="#666" font-size="10">LLM picks tool → execute</text>
  <text x="862" y="713" fill="#666" font-size="10">→ return result → repeat</text>

  <text x="850" y="738" fill="#333" font-size="11" font-weight="600">5. Response returned</text>
  <text x="862" y="755" fill="#666" font-size="10">JSON → Browser renders</text>

  <!-- Connect AgentService to Data Flow -->
  <line x1="790" y1="540" x2="828" y2="540" stroke="#27AE60" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>

</svg>