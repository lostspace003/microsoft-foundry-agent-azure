<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E86C1"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="900" height="680" rx="12" fill="#F7F9FB"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="64" rx="12" fill="#1B4F72"/>
  <rect x="0" y="32" width="900" height="32" fill="#1B4F72"/>
  <text x="450" y="28" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">Lab 8 — Deep Observability</text>
  <text x="450" y="52" text-anchor="middle" fill="#AED6F1" font-size="13">Tracing, Metrics &amp; Monitoring in Azure AI Foundry</text>

  <!-- Three Pillars -->
  <text x="450" y="104" text-anchor="middle" fill="#1B4F72" font-size="14" font-weight="700">Three Pillars of Observability</text>

  <!-- Traces -->
  <rect x="40" y="120" width="260" height="110" rx="10" fill="#fff" stroke="#2E86C1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="170" y="148" text-anchor="middle" fill="#1B4F72" font-size="13" font-weight="700">Traces (Spans)</text>
  <line x1="60" y1="158" x2="280" y2="158" stroke="#E8E8E8" stroke-width="1"/>
  <text x="60" y="178" fill="#5D6D7E" font-size="10">End-to-end request flow</text>
  <text x="60" y="196" fill="#5D6D7E" font-size="10">Nested spans per phase</text>
  <text x="60" y="214" fill="#2E86C1" font-size="10" font-weight="600">TracerProvider + SpanProcessor</text>

  <!-- Metrics -->
  <rect x="320" y="120" width="260" height="110" rx="10" fill="#fff" stroke="#27AE60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="148" text-anchor="middle" fill="#1E8449" font-size="13" font-weight="700">Metrics (Counters)</text>
  <line x1="340" y1="158" x2="560" y2="158" stroke="#E8E8E8" stroke-width="1"/>
  <text x="340" y="178" fill="#5D6D7E" font-size="10">request.count, tokens.used</text>
  <text x="340" y="196" fill="#5D6D7E" font-size="10">request.duration (histogram)</text>
  <text x="340" y="214" fill="#27AE60" font-size="10" font-weight="600">MeterProvider + MetricReader</text>

  <!-- Logs -->
  <rect x="600" y="120" width="260" height="110" rx="10" fill="#fff" stroke="#E74C3C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="148" text-anchor="middle" fill="#C0392B" font-size="13" font-weight="700">Logs (Events)</text>
  <line x1="620" y1="158" x2="840" y2="158" stroke="#E8E8E8" stroke-width="1"/>
  <text x="620" y="178" fill="#5D6D7E" font-size="10">Errors, warnings, exceptions</text>
  <text x="620" y="196" fill="#5D6D7E" font-size="10">span.record_exception()</text>
  <text x="620" y="214" fill="#E74C3C" font-size="10" font-weight="600">StatusCode.ERROR + events</text>

  <!-- Arrows down to OpenTelemetry SDK -->
  <line x1="170" y1="230" x2="170" y2="254" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="230" x2="450" y2="254" stroke="#27AE60" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="730" y1="230" x2="730" y2="254" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- OpenTelemetry SDK bar -->
  <rect x="80" y="254" width="740" height="40" rx="8" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.5"/>
  <text x="450" y="280" text-anchor="middle" fill="#1B4F72" font-size="12" font-weight="700">OpenTelemetry SDK  —  Resource: service.name=smartclaims-agent, version=2.0.0</text>

  <!-- Arrow down to Azure Monitor -->
  <line x1="450" y1="294" x2="450" y2="318" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Azure Monitor bar -->
  <rect x="200" y="318" width="500" height="40" rx="8" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.5"/>
  <text x="450" y="344" text-anchor="middle" fill="#1E8449" font-size="12" font-weight="700">Azure Application Insights  (or Console Exporter for local dev)</text>

  <!-- observed_call() section -->
  <text x="450" y="392" text-anchor="middle" fill="#1B4F72" font-size="14" font-weight="700">Instrumented Agent Call: observed_call()</text>

  <rect x="40" y="406" width="820" height="100" rx="10" fill="#fff" stroke="#2E86C1" stroke-width="1.2" filter="url(#shadow)"/>

  <!-- Span box inside -->
  <rect x="60" y="416" width="240" height="80" rx="6" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1"/>
  <text x="180" y="436" text-anchor="middle" fill="#1B4F72" font-size="11" font-weight="600">Span: agent.call</text>
  <text x="80" y="456" fill="#5D6D7E" font-size="9">agent.name, version, model</text>
  <text x="80" y="470" fill="#5D6D7E" font-size="9">tokens.input/output, duration</text>
  <text x="80" y="484" fill="#5D6D7E" font-size="9">status: success | error_type</text>

  <!-- Metrics box inside -->
  <rect x="320" y="416" width="240" height="80" rx="6" fill="#D5F5E3" stroke="#27AE60" stroke-width="1"/>
  <text x="440" y="436" text-anchor="middle" fill="#1E8449" font-size="11" font-weight="600">Metrics Recorded</text>
  <text x="340" y="456" fill="#5D6D7E" font-size="9">request.count   += 1 {status}</text>
  <text x="340" y="470" fill="#5D6D7E" font-size="9">request.duration += latency_s</text>
  <text x="340" y="484" fill="#5D6D7E" font-size="9">tokens.used     += total</text>

  <!-- Error handling box inside -->
  <rect x="580" y="416" width="260" height="80" rx="6" fill="#FADBD8" stroke="#E74C3C" stroke-width="1"/>
  <text x="710" y="436" text-anchor="middle" fill="#C0392B" font-size="11" font-weight="600">Error Handling</text>
  <text x="600" y="456" fill="#5D6D7E" font-size="9">AuthError      → auth_error</text>
  <text x="600" y="470" fill="#5D6D7E" font-size="9">HTTP 429       → rate_limited</text>
  <text x="600" y="484" fill="#5D6D7E" font-size="9">Exception      → span.record_exception()</text>

  <!-- Nested Spans section -->
  <text x="450" y="538" text-anchor="middle" fill="#1B4F72" font-size="14" font-weight="700">Nested Spans: claims_workflow()</text>

  <rect x="40" y="552" width="820" height="56" rx="8" fill="#FDEBD0" stroke="#E67E22" stroke-width="1.2"/>
  <text x="60" y="576" fill="#CA6F1E" font-size="11" font-weight="700">Parent:</text>
  <text x="120" y="576" fill="#CA6F1E" font-size="11">claims.workflow</text>
  <text x="60" y="596" fill="#5D6D7E" font-size="10">workflow.type, workflow.duration</text>

  <rect x="60" y="614" width="220" height="36" rx="6" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1"/>
  <text x="170" y="637" text-anchor="middle" fill="#1B4F72" font-size="10" font-weight="600">input.validation</text>

  <line x1="280" y1="632" x2="310" y2="632" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="310" y="614" width="260" height="36" rx="6" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1"/>
  <text x="440" y="637" text-anchor="middle" fill="#1B4F72" font-size="10" font-weight="600">agent.inference (LLM call)</text>

  <line x1="570" y1="632" x2="600" y2="632" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="600" y="614" width="240" height="36" rx="6" fill="#D5F5E3" stroke="#27AE60" stroke-width="1"/>
  <text x="720" y="637" text-anchor="middle" fill="#1E8449" font-size="10" font-weight="600">response.postprocess</text>

  <!-- Bottom: Production path -->
  <rect x="40" y="660" width="820" height="14" rx="4" fill="#1B4F72"/>
  <text x="450" y="671" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">Production: configure_azure_monitor() → Application Insights → KQL Dashboards → Alert Rules</text>
</svg>
