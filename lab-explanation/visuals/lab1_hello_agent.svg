<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E86C1"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="900" height="620" rx="12" fill="#F7F9FB"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="64" rx="12" fill="#1B4F72"/>
  <rect x="0" y="32" width="900" height="32" fill="#1B4F72"/>
  <text x="450" y="28" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">Lab 1 — Your First Agent</text>
  <text x="450" y="52" text-anchor="middle" fill="#AED6F1" font-size="13">Create an agent with custom instructions, single-turn and multi-turn conversations</text>

  <!-- Row 1: Agent Creation -->
  <text x="450" y="100" text-anchor="middle" fill="#1B4F72" font-size="14" font-weight="700">Agent Creation</text>

  <rect x="60" y="116" width="200" height="60" rx="8" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.2"/>
  <text x="160" y="143" text-anchor="middle" fill="#1B4F72" font-size="12" font-weight="600">PromptAgentDefinition</text>
  <text x="160" y="162" text-anchor="middle" fill="#5D6D7E" font-size="10">model + instructions</text>

  <line x1="260" y1="146" x2="320" y2="146" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="320" y="116" width="240" height="60" rx="8" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.2"/>
  <text x="440" y="143" text-anchor="middle" fill="#1E8449" font-size="12" font-weight="600">agents.create_version()</text>
  <text x="440" y="162" text-anchor="middle" fill="#5D6D7E" font-size="10">"smartclaims-hello" registered</text>

  <line x1="560" y1="146" x2="620" y2="146" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="620" y="116" width="220" height="60" rx="8" fill="#FDEBD0" stroke="#E67E22" stroke-width="1.2"/>
  <text x="730" y="143" text-anchor="middle" fill="#CA6F1E" font-size="12" font-weight="600">Agent in Foundry</text>
  <text x="730" y="162" text-anchor="middle" fill="#5D6D7E" font-size="10">name + version assigned</text>

  <!-- Row 2: Single Turn -->
  <text x="450" y="218" text-anchor="middle" fill="#1B4F72" font-size="14" font-weight="700">Single-Turn Request</text>

  <rect x="120" y="234" width="180" height="52" rx="8" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.2"/>
  <text x="210" y="257" text-anchor="middle" fill="#1B4F72" font-size="12" font-weight="600">User Message</text>
  <text x="210" y="275" text-anchor="middle" fill="#5D6D7E" font-size="10">"What does auto insurance cover?"</text>

  <line x1="300" y1="260" x2="370" y2="260" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="370" y="234" width="200" height="52" rx="8" fill="#fff" stroke="#2E86C1" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="470" y="255" text-anchor="middle" fill="#1B4F72" font-size="11" font-weight="600">responses.create()</text>
  <text x="470" y="273" text-anchor="middle" fill="#5D6D7E" font-size="10">agent_reference routes to agent</text>

  <line x1="570" y1="260" x2="630" y2="260" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="630" y="234" width="180" height="52" rx="8" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.2"/>
  <text x="720" y="257" text-anchor="middle" fill="#1E8449" font-size="12" font-weight="600">Agent Response</text>
  <text x="720" y="275" text-anchor="middle" fill="#5D6D7E" font-size="10">response.output_text</text>

  <!-- Row 3: Multi-Turn -->
  <text x="450" y="328" text-anchor="middle" fill="#1B4F72" font-size="14" font-weight="700">Multi-Turn Conversation</text>

  <rect x="60" y="344" width="170" height="52" rx="8" fill="#E8DAEF" stroke="#8E44AD" stroke-width="1.2"/>
  <text x="145" y="367" text-anchor="middle" fill="#6C3483" font-size="12" font-weight="600">conversations.create()</text>
  <text x="145" y="385" text-anchor="middle" fill="#5D6D7E" font-size="10">stateful session starts</text>

  <line x1="230" y1="370" x2="270" y2="370" stroke="#8E44AD" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="270" y="344" width="180" height="52" rx="8" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.2"/>
  <text x="360" y="365" text-anchor="middle" fill="#1B4F72" font-size="11" font-weight="600">Turn 1: "File a claim"</text>
  <text x="360" y="383" text-anchor="middle" fill="#5D6D7E" font-size="10">conversation=id</text>

  <line x1="450" y1="370" x2="490" y2="370" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="490" y="344" width="180" height="52" rx="8" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.2"/>
  <text x="580" y="365" text-anchor="middle" fill="#1B4F72" font-size="11" font-weight="600">Turn 2: "What docs needed?"</text>
  <text x="580" y="383" text-anchor="middle" fill="#5D6D7E" font-size="10">agent remembers context</text>

  <line x1="670" y1="370" x2="710" y2="370" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="710" y="344" width="140" height="52" rx="8" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.2"/>
  <text x="780" y="367" text-anchor="middle" fill="#1E8449" font-size="12" font-weight="600">Context-Aware</text>
  <text x="780" y="385" text-anchor="middle" fill="#5D6D7E" font-size="10">Reply</text>

  <!-- Key Concept -->
  <rect x="60" y="430" width="380" height="160" rx="10" fill="#fff" stroke="#D5D8DC" stroke-width="1" filter="url(#shadow)"/>
  <text x="250" y="458" text-anchor="middle" fill="#1B4F72" font-size="13" font-weight="700">Key Concepts</text>
  <line x1="80" y1="468" x2="420" y2="468" stroke="#E8E8E8" stroke-width="1"/>
  <circle cx="95" cy="490" r="4" fill="#2E86C1"/>
  <text x="110" y="495" fill="#2C3E50" font-size="11">agent_reference routes to YOUR agent</text>
  <circle cx="95" cy="514" r="4" fill="#2E86C1"/>
  <text x="110" y="519" fill="#2C3E50" font-size="11">conversation ID maintains memory</text>
  <circle cx="95" cy="538" r="4" fill="#2E86C1"/>
  <text x="110" y="543" fill="#2C3E50" font-size="11">create_version() registers in Foundry</text>
  <circle cx="95" cy="562" r="4" fill="#2E86C1"/>
  <text x="110" y="567" fill="#2C3E50" font-size="11">Always delete agent when done</text>

  <!-- SDK -->
  <rect x="460" y="430" width="380" height="160" rx="10" fill="#fff" stroke="#D5D8DC" stroke-width="1" filter="url(#shadow)"/>
  <text x="650" y="458" text-anchor="middle" fill="#1B4F72" font-size="13" font-weight="700">SDK Classes Used</text>
  <line x1="480" y1="468" x2="820" y2="468" stroke="#E8E8E8" stroke-width="1"/>
  <rect x="480" y="480" width="340" height="24" rx="4" fill="#EBF5FB"/>
  <text x="495" y="497" fill="#2E86C1" font-size="11" font-family="Consolas, monospace">PromptAgentDefinition</text>
  <text x="720" y="497" fill="#7F8C8D" font-size="10">model + instructions</text>
  <rect x="480" y="510" width="340" height="24" rx="4" fill="#EBF5FB"/>
  <text x="495" y="527" fill="#2E86C1" font-size="11" font-family="Consolas, monospace">agents.create_version()</text>
  <text x="720" y="527" fill="#7F8C8D" font-size="10">register agent</text>
  <rect x="480" y="540" width="340" height="24" rx="4" fill="#EBF5FB"/>
  <text x="495" y="557" fill="#2E86C1" font-size="11" font-family="Consolas, monospace">conversations.create()</text>
  <text x="720" y="557" fill="#7F8C8D" font-size="10">stateful session</text>
  <rect x="480" y="570" width="340" height="24" rx="4" fill="#EBF5FB"/>
  <text x="495" y="587" fill="#2E86C1" font-size="11" font-family="Consolas, monospace">responses.create()</text>
  <text x="720" y="587" fill="#7F8C8D" font-size="10">send + receive</text>
</svg>
