<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E86C1"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="12" fill="#F7F9FB"/>

  <!-- Title Bar -->
  <rect x="0" y="0" width="900" height="64" rx="12" fill="#1B4F72"/>
  <rect x="0" y="32" width="900" height="32" fill="#1B4F72"/>
  <text x="450" y="28" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">Lab 0 — Test Connection</text>
  <text x="450" y="52" text-anchor="middle" fill="#AED6F1" font-size="13">Verify SDK, credentials, and connectivity before building agents</text>

  <!-- Step 1: .env -->
  <rect x="60" y="100" width="200" height="74" rx="10" fill="#fff" stroke="#2E86C1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="126" text-anchor="middle" fill="#1B4F72" font-size="13" font-weight="700">Step 1</text>
  <text x="160" y="146" text-anchor="middle" fill="#2C3E50" font-size="12">Load .env file</text>
  <text x="160" y="163" text-anchor="middle" fill="#7F8C8D" font-size="10">PROJECT_ENDPOINT</text>

  <!-- Arrow 1-2 -->
  <line x1="260" y1="137" x2="320" y2="137" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Create Clients -->
  <rect x="320" y="100" width="240" height="74" rx="10" fill="#fff" stroke="#2E86C1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="126" text-anchor="middle" fill="#1B4F72" font-size="13" font-weight="700">Step 2</text>
  <text x="440" y="146" text-anchor="middle" fill="#2C3E50" font-size="12">Create AIProjectClient</text>
  <text x="440" y="163" text-anchor="middle" fill="#7F8C8D" font-size="10">DefaultAzureCredential (az login)</text>

  <!-- Arrow 2-3 -->
  <line x1="560" y1="137" x2="620" y2="137" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Test Prompt -->
  <rect x="620" y="100" width="220" height="74" rx="10" fill="#fff" stroke="#27AE60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="126" text-anchor="middle" fill="#1E8449" font-size="13" font-weight="700">Step 3</text>
  <text x="730" y="146" text-anchor="middle" fill="#2C3E50" font-size="12">Send test prompt</text>
  <text x="730" y="163" text-anchor="middle" fill="#7F8C8D" font-size="10">responses.create(model, input)</text>

  <!-- Detailed Flow Section -->
  <text x="450" y="220" text-anchor="middle" fill="#1B4F72" font-size="15" font-weight="700">How It Works</text>

  <!-- .env box -->
  <rect x="100" y="250" width="160" height="56" rx="8" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.2"/>
  <text x="180" y="275" text-anchor="middle" fill="#1B4F72" font-size="12" font-weight="600">.env</text>
  <text x="180" y="295" text-anchor="middle" fill="#5D6D7E" font-size="10">ENDPOINT + MODEL</text>

  <!-- Arrow -->
  <line x1="260" y1="278" x2="310" y2="278" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Config box -->
  <rect x="310" y="250" width="160" height="56" rx="8" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.2"/>
  <text x="390" y="275" text-anchor="middle" fill="#1B4F72" font-size="12" font-weight="600">utils/config.py</text>
  <text x="390" y="295" text-anchor="middle" fill="#5D6D7E" font-size="10">get_clients()</text>

  <!-- Arrow -->
  <line x1="470" y1="278" x2="520" y2="278" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- AIProjectClient box -->
  <rect x="520" y="244" width="180" height="68" rx="8" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.2"/>
  <text x="610" y="270" text-anchor="middle" fill="#1E8449" font-size="12" font-weight="600">AIProjectClient</text>
  <text x="610" y="288" text-anchor="middle" fill="#5D6D7E" font-size="10">project_client</text>
  <text x="610" y="303" text-anchor="middle" fill="#5D6D7E" font-size="10">get_openai_client()</text>

  <!-- Arrow down from AIProjectClient -->
  <line x1="610" y1="312" x2="610" y2="348" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- OpenAI Client box -->
  <rect x="520" y="348" width="180" height="52" rx="8" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.2"/>
  <text x="610" y="373" text-anchor="middle" fill="#1E8449" font-size="12" font-weight="600">OpenAI Client</text>
  <text x="610" y="391" text-anchor="middle" fill="#5D6D7E" font-size="10">openai_client</text>

  <!-- Arrow to Azure -->
  <line x1="700" y1="374" x2="740" y2="374" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Azure Cloud box -->
  <rect x="740" y="340" width="130" height="68" rx="8" fill="#FDEBD0" stroke="#E67E22" stroke-width="1.2"/>
  <text x="805" y="366" text-anchor="middle" fill="#CA6F1E" font-size="12" font-weight="600">Azure OpenAI</text>
  <text x="805" y="384" text-anchor="middle" fill="#5D6D7E" font-size="10">gpt-4o-mini</text>
  <text x="805" y="399" text-anchor="middle" fill="#5D6D7E" font-size="10">Foundry Service</text>

  <!-- What You Need Section -->
  <rect x="60" y="440" width="370" height="150" rx="10" fill="#fff" stroke="#D5D8DC" stroke-width="1" filter="url(#shadow)"/>
  <text x="245" y="468" text-anchor="middle" fill="#1B4F72" font-size="13" font-weight="700">Prerequisites</text>
  <line x1="80" y1="478" x2="410" y2="478" stroke="#E8E8E8" stroke-width="1"/>
  <circle cx="95" cy="500" r="4" fill="#27AE60"/>
  <text x="110" y="505" fill="#2C3E50" font-size="11">Azure subscription + AI Foundry project</text>
  <circle cx="95" cy="524" r="4" fill="#27AE60"/>
  <text x="110" y="529" fill="#2C3E50" font-size="11">az login completed</text>
  <circle cx="95" cy="548" r="4" fill="#27AE60"/>
  <text x="110" y="553" fill="#2C3E50" font-size="11">.env with PROJECT_ENDPOINT</text>
  <circle cx="95" cy="572" r="4" fill="#27AE60"/>
  <text x="110" y="577" fill="#2C3E50" font-size="11">.env with MODEL_DEPLOYMENT_NAME</text>

  <!-- SDK Used Section -->
  <rect x="460" y="440" width="380" height="150" rx="10" fill="#fff" stroke="#D5D8DC" stroke-width="1" filter="url(#shadow)"/>
  <text x="650" y="468" text-anchor="middle" fill="#1B4F72" font-size="13" font-weight="700">SDK Classes Used</text>
  <line x1="480" y1="478" x2="820" y2="478" stroke="#E8E8E8" stroke-width="1"/>
  <rect x="480" y="490" width="340" height="24" rx="4" fill="#EBF5FB"/>
  <text x="495" y="507" fill="#2E86C1" font-size="11" font-family="Consolas, monospace">AIProjectClient</text>
  <text x="700" y="507" fill="#7F8C8D" font-size="10">project gateway</text>
  <rect x="480" y="520" width="340" height="24" rx="4" fill="#EBF5FB"/>
  <text x="495" y="537" fill="#2E86C1" font-size="11" font-family="Consolas, monospace">DefaultAzureCredential</text>
  <text x="700" y="537" fill="#7F8C8D" font-size="10">auto auth (az login)</text>
  <rect x="480" y="550" width="340" height="24" rx="4" fill="#EBF5FB"/>
  <text x="495" y="567" fill="#2E86C1" font-size="11" font-family="Consolas, monospace">responses.create()</text>
  <text x="700" y="567" fill="#7F8C8D" font-size="10">basic model call</text>

  <!-- Run command footer -->
  <rect x="280" y="600" width="340" height="0" rx="6" fill="none"/>
</svg>
