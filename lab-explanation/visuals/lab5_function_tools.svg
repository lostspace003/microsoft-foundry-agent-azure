<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E86C1"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#E67E22"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="900" height="600" rx="12" fill="#F7F9FB"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="64" rx="12" fill="#1B4F72"/>
  <rect x="0" y="32" width="900" height="32" fill="#1B4F72"/>
  <text x="450" y="28" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">Lab 5 — Function Tools</text>
  <text x="450" y="52" text-anchor="middle" fill="#AED6F1" font-size="13">Custom business logic as agent tools -- agent decides WHEN, YOU execute</text>

  <!-- Function Call Loop -->
  <text x="450" y="104" text-anchor="middle" fill="#1B4F72" font-size="14" font-weight="700">Function Call Loop</text>

  <!-- Step 1 -->
  <rect x="60" y="122" width="150" height="56" rx="8" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.2"/>
  <text x="135" y="147" text-anchor="middle" fill="#1B4F72" font-size="11" font-weight="600">User Query</text>
  <text x="135" y="166" text-anchor="middle" fill="#5D6D7E" font-size="9">"Status of CLM-0042?"</text>

  <line x1="210" y1="150" x2="250" y2="150" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <rect x="250" y="122" width="150" height="56" rx="8" fill="#FDEBD0" stroke="#E67E22" stroke-width="1.2"/>
  <text x="325" y="147" text-anchor="middle" fill="#CA6F1E" font-size="11" font-weight="600">Agent Decides</text>
  <text x="325" y="166" text-anchor="middle" fill="#5D6D7E" font-size="9">call get_claim_status</text>

  <line x1="400" y1="150" x2="440" y2="150" stroke="#E67E22" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <!-- Step 3 -->
  <rect x="440" y="118" width="180" height="64" rx="8" fill="#E8DAEF" stroke="#8E44AD" stroke-width="1.2"/>
  <text x="530" y="142" text-anchor="middle" fill="#6C3483" font-size="11" font-weight="600">YOUR Code Executes</text>
  <text x="530" y="160" text-anchor="middle" fill="#5D6D7E" font-size="9">get_claim_status("CLM-0042")</text>
  <text x="530" y="174" text-anchor="middle" fill="#5D6D7E" font-size="9">reads CSV, returns JSON</text>

  <line x1="620" y1="150" x2="660" y2="150" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <rect x="660" y="122" width="180" height="56" rx="8" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.2"/>
  <text x="750" y="142" text-anchor="middle" fill="#1E8449" font-size="11" font-weight="600">Agent Formats Answer</text>
  <text x="750" y="162" text-anchor="middle" fill="#5D6D7E" font-size="9">natural language response</text>
  <text x="750" y="174" text-anchor="middle" fill="#5D6D7E" font-size="9">with claim details</text>

  <!-- Two Functions -->
  <text x="450" y="228" text-anchor="middle" fill="#1B4F72" font-size="14" font-weight="700">Registered Functions</text>

  <!-- Func 1 -->
  <rect x="60" y="244" width="380" height="110" rx="10" fill="#fff" stroke="#2E86C1" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="250" y="270" text-anchor="middle" fill="#1B4F72" font-size="13" font-weight="700">get_claim_status(claim_id)</text>
  <line x1="80" y1="280" x2="420" y2="280" stroke="#E8E8E8" stroke-width="1"/>
  <text x="90" y="300" fill="#5D6D7E" font-size="10">Input: claim_id (CLM-XXXX format)</text>
  <text x="90" y="318" fill="#5D6D7E" font-size="10">Output: status, amount, adjuster, fraud_score</text>
  <text x="90" y="340" fill="#2E86C1" font-size="10" font-weight="600">Reads from contoso_claims_data.csv</text>

  <!-- Func 2 -->
  <rect x="460" y="244" width="380" height="110" rx="10" fill="#fff" stroke="#E67E22" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="650" y="270" text-anchor="middle" fill="#CA6F1E" font-size="12" font-weight="700">calculate_fraud_risk(...)</text>
  <line x1="480" y1="280" x2="820" y2="280" stroke="#E8E8E8" stroke-width="1"/>
  <text x="480" y="300" fill="#5D6D7E" font-size="10">Input: incident_type, claim_amount, region, days</text>
  <text x="480" y="318" fill="#5D6D7E" font-size="10">Output: risk score (0-1), level, recommendation</text>
  <text x="480" y="340" fill="#E67E22" font-size="10" font-weight="600">Rule-based scoring (simulates ML model)</text>

  <!-- Key Concepts -->
  <rect x="60" y="386" width="380" height="186" rx="10" fill="#fff" stroke="#D5D8DC" stroke-width="1" filter="url(#shadow)"/>
  <text x="250" y="414" text-anchor="middle" fill="#1B4F72" font-size="13" font-weight="700">Key Concepts</text>
  <line x1="80" y1="424" x2="420" y2="424" stroke="#E8E8E8" stroke-width="1"/>
  <circle cx="95" cy="446" r="4" fill="#2E86C1"/>
  <text x="110" y="451" fill="#2C3E50" font-size="11">Agent decides WHEN to call functions</text>
  <circle cx="95" cy="470" r="4" fill="#E67E22"/>
  <text x="110" y="475" fill="#2C3E50" font-size="11">YOU execute the function locally</text>
  <circle cx="95" cy="494" r="4" fill="#8E44AD"/>
  <text x="110" y="499" fill="#2C3E50" font-size="11">Results sent back via previous_response_id</text>
  <circle cx="95" cy="518" r="4" fill="#27AE60"/>
  <text x="110" y="523" fill="#2C3E50" font-size="11">ask_with_functions() handles the loop</text>
  <circle cx="95" cy="542" r="4" fill="#E74C3C"/>
  <text x="110" y="547" fill="#2C3E50" font-size="11">Fresh conversation per query (avoid conflicts)</text>

  <!-- SDK -->
  <rect x="460" y="386" width="380" height="186" rx="10" fill="#fff" stroke="#D5D8DC" stroke-width="1" filter="url(#shadow)"/>
  <text x="650" y="414" text-anchor="middle" fill="#1B4F72" font-size="13" font-weight="700">SDK Pattern</text>
  <line x1="480" y1="424" x2="820" y2="424" stroke="#E8E8E8" stroke-width="1"/>
  <rect x="480" y="438" width="340" height="24" rx="4" fill="#EBF5FB"/>
  <text x="495" y="455" fill="#2E86C1" font-size="10" font-family="Consolas, monospace">{"type":"function","name":"..."}</text>
  <text x="790" y="455" fill="#7F8C8D" font-size="9">schema</text>
  <rect x="480" y="468" width="340" height="24" rx="4" fill="#EBF5FB"/>
  <text x="495" y="485" fill="#2E86C1" font-size="10" font-family="Consolas, monospace">item.type == "function_call"</text>
  <text x="790" y="485" fill="#7F8C8D" font-size="9">detect</text>
  <rect x="480" y="498" width="340" height="24" rx="4" fill="#EBF5FB"/>
  <text x="495" y="515" fill="#2E86C1" font-size="10" font-family="Consolas, monospace">fc.name, fc.arguments, fc.call_id</text>
  <text x="790" y="515" fill="#7F8C8D" font-size="9">extract</text>
  <rect x="480" y="528" width="340" height="24" rx="4" fill="#EBF5FB"/>
  <text x="495" y="545" fill="#2E86C1" font-size="10" font-family="Consolas, monospace">previous_response_id</text>
  <text x="760" y="545" fill="#7F8C8D" font-size="9">send results</text>
</svg>
