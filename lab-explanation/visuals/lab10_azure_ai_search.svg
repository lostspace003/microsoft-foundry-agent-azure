<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E86C1"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="900" height="580" rx="12" fill="#F7F9FB"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="64" rx="12" fill="#1B4F72"/>
  <rect x="0" y="32" width="900" height="32" fill="#1B4F72"/>
  <text x="450" y="28" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">Lab 10 — Azure AI Search Grounding</text>
  <text x="450" y="52" text-anchor="middle" fill="#AED6F1" font-size="13">Connect agents to existing enterprise search indexes for production RAG</text>

  <!-- Lab 3 vs Lab 11 -->
  <text x="450" y="104" text-anchor="middle" fill="#1B4F72" font-size="14" font-weight="700">Lab 3 (Prototype) vs Lab 10 (Enterprise)</text>

  <!-- Lab 3 side -->
  <rect x="40" y="120" width="380" height="130" rx="10" fill="#fff" stroke="#2E86C1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="148" text-anchor="middle" fill="#1B4F72" font-size="13" font-weight="700">Lab 3: FileSearchTool</text>
  <line x1="60" y1="158" x2="400" y2="158" stroke="#E8E8E8" stroke-width="1"/>
  <text x="70" y="178" fill="#5D6D7E" font-size="10">Upload files to platform</text>
  <text x="70" y="196" fill="#5D6D7E" font-size="10">Platform chunks + embeds + indexes</text>
  <text x="70" y="214" fill="#5D6D7E" font-size="10">Vector search only</text>
  <text x="70" y="232" fill="#2E86C1" font-size="10" font-weight="600">Best for: prototyping, small doc sets</text>

  <!-- Lab 11 side -->
  <rect x="480" y="120" width="380" height="130" rx="10" fill="#fff" stroke="#27AE60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="148" text-anchor="middle" fill="#1E8449" font-size="13" font-weight="700">Lab 10: AzureAISearchAgentTool</text>
  <line x1="500" y1="158" x2="840" y2="158" stroke="#E8E8E8" stroke-width="1"/>
  <text x="510" y="178" fill="#5D6D7E" font-size="10">Connect to YOUR existing index</text>
  <text x="510" y="196" fill="#5D6D7E" font-size="10">Hybrid search (vector + keyword + semantic)</text>
  <text x="510" y="214" fill="#5D6D7E" font-size="10">Security trimming, custom analyzers</text>
  <text x="510" y="232" fill="#27AE60" font-size="10" font-weight="600">Best for: production, millions of docs</text>

  <!-- Setup flow -->
  <text x="450" y="290" text-anchor="middle" fill="#1B4F72" font-size="14" font-weight="700">Setup Flow</text>

  <rect x="40" y="308" width="190" height="56" rx="8" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.2"/>
  <text x="135" y="332" text-anchor="middle" fill="#1B4F72" font-size="11" font-weight="600">AI Search Index</text>
  <text x="135" y="352" text-anchor="middle" fill="#5D6D7E" font-size="9">already populated</text>

  <line x1="230" y1="336" x2="270" y2="336" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="270" y="308" width="190" height="56" rx="8" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.2"/>
  <text x="365" y="332" text-anchor="middle" fill="#1B4F72" font-size="11" font-weight="600">AzureAISearchIndex</text>
  <text x="365" y="352" text-anchor="middle" fill="#5D6D7E" font-size="9">connection_name + index_name</text>

  <line x1="460" y1="336" x2="500" y2="336" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="500" y="308" width="180" height="56" rx="8" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.2"/>
  <text x="590" y="332" text-anchor="middle" fill="#1B4F72" font-size="11" font-weight="600">AzureAISearchAgentTool</text>
  <text x="590" y="352" text-anchor="middle" fill="#5D6D7E" font-size="9">tool definition</text>

  <line x1="680" y1="336" x2="720" y2="336" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="720" y="308" width="140" height="56" rx="8" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.2"/>
  <text x="790" y="332" text-anchor="middle" fill="#1E8449" font-size="11" font-weight="600">Agent Created</text>
  <text x="790" y="352" text-anchor="middle" fill="#5D6D7E" font-size="9">search grounded</text>

  <!-- Comparison table -->
  <rect x="60" y="396" width="780" height="150" rx="10" fill="#fff" stroke="#D5D8DC" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="424" text-anchor="middle" fill="#1B4F72" font-size="13" font-weight="700">Feature Comparison</text>
  <line x1="80" y1="434" x2="820" y2="434" stroke="#E8E8E8" stroke-width="1"/>

  <text x="130" y="454" fill="#1B4F72" font-size="10" font-weight="600">Feature</text>
  <text x="370" y="454" fill="#2E86C1" font-size="10" font-weight="600">Lab 3 (FileSearch)</text>
  <text x="650" y="454" fill="#27AE60" font-size="10" font-weight="600">Lab 10 (AI Search)</text>

  <text x="130" y="474" fill="#5D6D7E" font-size="10">Scale</text>
  <text x="370" y="474" fill="#5D6D7E" font-size="10">Small (&lt; 100 files)</text>
  <text x="650" y="474" fill="#5D6D7E" font-size="10">Millions of documents</text>

  <text x="130" y="494" fill="#5D6D7E" font-size="10">Search type</text>
  <text x="370" y="494" fill="#5D6D7E" font-size="10">Vector only</text>
  <text x="650" y="494" fill="#5D6D7E" font-size="10">Hybrid (vector + keyword)</text>

  <text x="130" y="514" fill="#5D6D7E" font-size="10">Security trimming</text>
  <text x="370" y="514" fill="#E74C3C" font-size="10">Not supported</text>
  <text x="650" y="514" fill="#27AE60" font-size="10">Per-document ACLs</text>

  <text x="130" y="534" fill="#5D6D7E" font-size="10">Index management</text>
  <text x="370" y="534" fill="#5D6D7E" font-size="10">Platform manages</text>
  <text x="650" y="534" fill="#5D6D7E" font-size="10">You control</text>
</svg>
