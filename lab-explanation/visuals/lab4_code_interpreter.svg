<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E86C1"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="900" height="580" rx="12" fill="#F7F9FB"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="64" rx="12" fill="#1B4F72"/>
  <rect x="0" y="32" width="900" height="32" fill="#1B4F72"/>
  <text x="450" y="28" text-anchor="middle" fill="#fff" font-size="20" font-weight="700">Lab 4 — Code Interpreter</text>
  <text x="450" y="52" text-anchor="middle" fill="#AED6F1" font-size="13">Agent writes and runs Python code in a sandbox to analyze claims data</text>

  <!-- Setup Flow -->
  <text x="450" y="104" text-anchor="middle" fill="#1B4F72" font-size="14" font-weight="700">Setup</text>

  <rect x="60" y="118" width="180" height="52" rx="8" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.2"/>
  <text x="150" y="141" text-anchor="middle" fill="#1B4F72" font-size="12" font-weight="600">Claims CSV</text>
  <text x="150" y="159" text-anchor="middle" fill="#5D6D7E" font-size="10">500 records</text>

  <line x1="240" y1="144" x2="290" y2="144" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="290" y="118" width="200" height="52" rx="8" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.2"/>
  <text x="390" y="141" text-anchor="middle" fill="#1B4F72" font-size="12" font-weight="600">files.create()</text>
  <text x="390" y="159" text-anchor="middle" fill="#5D6D7E" font-size="10">purpose="assistants"</text>

  <line x1="490" y1="144" x2="540" y2="144" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="540" y="118" width="300" height="52" rx="8" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.2"/>
  <text x="690" y="141" text-anchor="middle" fill="#1E8449" font-size="12" font-weight="600">CodeInterpreterTool + ContainerAuto</text>
  <text x="690" y="159" text-anchor="middle" fill="#5D6D7E" font-size="10">CSV pre-loaded into Python sandbox</text>

  <!-- Runtime Flow -->
  <text x="450" y="212" text-anchor="middle" fill="#1B4F72" font-size="14" font-weight="700">How Queries Work</text>

  <rect x="60" y="230" width="160" height="56" rx="8" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.2"/>
  <text x="140" y="254" text-anchor="middle" fill="#1B4F72" font-size="11" font-weight="600">User Query</text>
  <text x="140" y="274" text-anchor="middle" fill="#5D6D7E" font-size="10">"Executive summary"</text>

  <line x1="220" y1="258" x2="260" y2="258" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="260" y="228" width="160" height="60" rx="8" fill="#FDEBD0" stroke="#E67E22" stroke-width="1.2"/>
  <text x="340" y="252" text-anchor="middle" fill="#CA6F1E" font-size="11" font-weight="600">Agent Writes Code</text>
  <text x="340" y="270" text-anchor="middle" fill="#5D6D7E" font-size="9">import pandas as pd</text>
  <text x="340" y="282" text-anchor="middle" fill="#5D6D7E" font-size="9">df.groupby('status')...</text>

  <line x1="420" y1="258" x2="460" y2="258" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="460" y="228" width="160" height="60" rx="8" fill="#E8DAEF" stroke="#8E44AD" stroke-width="1.2"/>
  <text x="540" y="252" text-anchor="middle" fill="#6C3483" font-size="11" font-weight="600">Sandbox Executes</text>
  <text x="540" y="270" text-anchor="middle" fill="#5D6D7E" font-size="10">pandas + matplotlib</text>
  <text x="540" y="282" text-anchor="middle" fill="#5D6D7E" font-size="10">run in isolation</text>

  <line x1="620" y1="258" x2="660" y2="258" stroke="#2E86C1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="660" y="228" width="180" height="60" rx="8" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.2"/>
  <text x="750" y="252" text-anchor="middle" fill="#1E8449" font-size="11" font-weight="600">Results + Charts</text>
  <text x="750" y="270" text-anchor="middle" fill="#5D6D7E" font-size="10">text analysis + PNG</text>
  <text x="750" y="282" text-anchor="middle" fill="#5D6D7E" font-size="10">images returned</text>

  <!-- Key Concepts -->
  <rect x="60" y="320" width="380" height="230" rx="10" fill="#fff" stroke="#D5D8DC" stroke-width="1" filter="url(#shadow)"/>
  <text x="250" y="348" text-anchor="middle" fill="#1B4F72" font-size="13" font-weight="700">Key Concepts</text>
  <line x1="80" y1="358" x2="420" y2="358" stroke="#E8E8E8" stroke-width="1"/>
  <circle cx="95" cy="380" r="4" fill="#2E86C1"/>
  <text x="110" y="385" fill="#2C3E50" font-size="11">Agent writes Python -- you never see the code</text>
  <circle cx="95" cy="404" r="4" fill="#2E86C1"/>
  <text x="110" y="409" fill="#2C3E50" font-size="11">Sandbox has pandas, matplotlib pre-installed</text>
  <circle cx="95" cy="428" r="4" fill="#2E86C1"/>
  <text x="110" y="433" fill="#2C3E50" font-size="11">CSV is pre-loaded via file_ids</text>
  <circle cx="95" cy="452" r="4" fill="#2E86C1"/>
  <text x="110" y="457" fill="#2C3E50" font-size="11">Charts saved as PNG inside container</text>
  <circle cx="95" cy="476" r="4" fill="#2E86C1"/>
  <text x="110" y="481" fill="#2C3E50" font-size="11">Download charts via containers.files API</text>
  <circle cx="95" cy="500" r="4" fill="#E74C3C"/>
  <text x="110" y="505" fill="#2C3E50" font-size="11">Code runs server-side (not on your machine)</text>

  <!-- SDK -->
  <rect x="460" y="320" width="380" height="230" rx="10" fill="#fff" stroke="#D5D8DC" stroke-width="1" filter="url(#shadow)"/>
  <text x="650" y="348" text-anchor="middle" fill="#1B4F72" font-size="13" font-weight="700">SDK Classes Used</text>
  <line x1="480" y1="358" x2="820" y2="358" stroke="#E8E8E8" stroke-width="1"/>
  <rect x="480" y="372" width="340" height="24" rx="4" fill="#EBF5FB"/>
  <text x="495" y="389" fill="#2E86C1" font-size="11" font-family="Consolas, monospace">files.create()</text>
  <text x="720" y="389" fill="#7F8C8D" font-size="10">upload CSV</text>
  <rect x="480" y="402" width="340" height="24" rx="4" fill="#EBF5FB"/>
  <text x="495" y="419" fill="#2E86C1" font-size="11" font-family="Consolas, monospace">CodeInterpreterTool</text>
  <text x="720" y="419" fill="#7F8C8D" font-size="10">enable sandbox</text>
  <rect x="480" y="432" width="340" height="24" rx="4" fill="#EBF5FB"/>
  <text x="495" y="449" fill="#2E86C1" font-size="11" font-family="Consolas, monospace">CodeInterpreterContainerAuto</text>
  <text x="720" y="449" fill="#7F8C8D" font-size="10">pre-load files</text>
  <rect x="480" y="462" width="340" height="24" rx="4" fill="#EBF5FB"/>
  <text x="495" y="479" fill="#2E86C1" font-size="11" font-family="Consolas, monospace">containers.files.content</text>
  <text x="720" y="479" fill="#7F8C8D" font-size="10">download charts</text>
</svg>
