  <line x1="445" y1="372" x2="445" y2="394" stroke="#2E86C1" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="370" y="394" width="150" height="44" rx="7" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.2"/>
