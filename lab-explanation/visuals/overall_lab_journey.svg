  <text x="500" y="30" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">SmartClaims Agent &#x2014; Complete Lab Journey</text>
  <text x="500" y="55" text-anchor="middle" fill="#AED6F1" font-size="13">Microsoft Foundry Agent Service | 11 Labs | Insurance AI</text>

  <!-- Lab Progression Flow -->
  <text x="500" y="100" text-anchor="middle" fill="#1B4F72" font-size="15" font-weight="700">Lab Progression</text>

  <!-- ===== PHASE 1: Foundation (Labs 0-2) ===== -->
  <rect x="750" y="116" width="210" height="44" rx="6" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1" stroke-dasharray="4"/>
  <text x="855" y="143" text-anchor="middle" fill="#2E86C1" font-size="10" font-weight="600">Phase 1: Foundation</text>

  <rect x="40" y="116" width="150" height="44" rx="7" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.2"/>
  <text x="115" y="133" text-anchor="middle" fill="#1B4F72" font-size="10" font-weight="700">Lab 0: Test Connection</text>
  <text x="115" y="150" text-anchor="middle" fill="#5D6D7E" font-size="8">Verify .env + credentials</text>

  <line x1="190" y1="138" x2="215" y2="138" stroke="#2E86C1" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="215" y="116" width="150" height="44" rx="7" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.2"/>
  <text x="290" y="133" text-anchor="middle" fill="#1B4F72" font-size="10" font-weight="700">Lab 1: Hello Agent</text>
  <text x="290" y="150" text-anchor="middle" fill="#5D6D7E" font-size="8">Create + converse</text>

  <line x1="365" y1="138" x2="390" y2="138" stroke="#2E86C1" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="390" y="116" width="150" height="44" rx="7" fill="#EBF5FB" stroke="#2E86C1" stroke-width="1.2"/>
