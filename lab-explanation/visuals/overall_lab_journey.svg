  <text x="220" y="485" text-anchor="middle" fill="#1E8449" font-size="10" font-weight="700">Lab 8: Observability</text>
  <text x="220" y="502" text-anchor="middle" fill="#5D6D7E" font-size="8">Tracing, metrics, monitoring</text>

  <rect x="360" y="468" width="170" height="44" rx="7" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.2"/>
  <text x="445" y="485" text-anchor="middle" fill="#1E8449" font-size="10" font-weight="700">Lab 9: Streaming</text>
  <text x="445" y="502" text-anchor="middle" fill="#5D6D7E" font-size="8">Token-by-token UX</text>

  <rect x="575" y="468" width="170" height="44" rx="7" fill="#D5F5E3" stroke="#27AE60" stroke-width="1.2"/>
  <text x="660" y="485" text-anchor="middle" fill="#1E8449" font-size="10" font-weight="700">Lab 10: AI Search</text>
  <text x="660" y="502" text-anchor="middle" fill="#5D6D7E" font-size="8">Enterprise RAG</text>

  <!-- ===== PHASE 5: Deploy (Lab 11) ===== -->
  <rect x="750" y="538" width="210" height="50" rx="6" fill="#1B4F72" stroke="#1B4F72" stroke-width="1" stroke-dasharray="4"/>
  <text x="855" y="568" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Phase 5: Deploy</text>

  <!-- Merge to Lab 11 -->
  <line x1="220" y1="512" x2="445" y2="542" stroke="#2E86C1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="445" y1="512" x2="445" y2="542" stroke="#2E86C1" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="512" x2="445" y2="542" stroke="#2E86C1" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="350" y="542" width="190" height="50" rx="8" fill="#1B4F72" stroke="#1B4F72" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="445" y="564" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Lab 11: FastAPI Deployment</text>
  <text x="445" y="582" text-anchor="middle" fill="#AED6F1" font-size="9">Web app + Azure App Service</text>

  <!-- ===== Tool Types Table ===== -->
  <rect x="40" y="616" width="920" height="155" rx="10" fill="#fff" stroke="#D5D8DC" stroke-width="1" filter="url(#shadow)"/>
  <text x="500" y="642" text-anchor="middle" fill="#1B4F72" font-size="14" font-weight="700">Tool Types Across Labs</text>
  <line x1="60" y1="652" x2="940" y2="652" stroke="#E8E8E8" stroke-width="1"/>

  <!-- Headers -->
  <text x="100" y="670" fill="#1B4F72" font-size="10" font-weight="600">Tool</text>
  <text x="300" y="670" fill="#1B4F72" font-size="10" font-weight="600">Labs</text>
  <text x="440" y="670" fill="#1B4F72" font-size="10" font-weight="600">Execution</text>
  <text x="660" y="670" fill="#1B4F72" font-size="10" font-weight="600">Insurance Use Case</text>

  <!-- Row 1 -->
  <rect x="60" y="678" width="16" height="16" rx="3" fill="#27AE60"/>
  <text x="100" y="691" fill="#5D6D7E" font-size="10">File Search (RAG)</text>
  <text x="300" y="691" fill="#5D6D7E" font-size="10">3, 6</text>
  <text x="440" y="691" fill="#5D6D7E" font-size="10">Server-side (automatic)</text>
  <text x="660" y="691" fill="#5D6D7E" font-size="10">Policy document Q and A</text>

  <!-- Row 2 -->
  <rect x="60" y="698" width="16" height="16" rx="3" fill="#8E44AD"/>
  <text x="100" y="711" fill="#5D6D7E" font-size="10">Code Interpreter</text>
  <text x="300" y="711" fill="#5D6D7E" font-size="10">4, 6</text>
  <text x="440" y="711" fill="#5D6D7E" font-size="10">Server-side (sandbox)</text>
  <text x="660" y="711" fill="#5D6D7E" font-size="10">Claims analytics, charts</text>

  <!-- Row 3 -->
  <rect x="60" y="718" width="16" height="16" rx="3" fill="#E67E22"/>
  <text x="100" y="731" fill="#5D6D7E" font-size="10">Custom Functions</text>
  <text x="300" y="731" fill="#5D6D7E" font-size="10">5, 6, 7</text>
  <text x="440" y="731" fill="#5D6D7E" font-size="10">Client-side (your code)</text>
  <text x="660" y="731" fill="#5D6D7E" font-size="10">Claim lookup, fraud risk, web search</text>

  <!-- Row 4 -->
  <rect x="60" y="738" width="16" height="16" rx="3" fill="#2E86C1"/>
  <text x="100" y="751" fill="#5D6D7E" font-size="10">Observability + Streaming + AI Search</text>
  <text x="300" y="751" fill="#5D6D7E" font-size="10">8, 9, 10</text>
  <text x="440" y="751" fill="#5D6D7E" font-size="10">Advanced SDK features</text>
  <text x="660" y="751" fill="#5D6D7E" font-size="10">Monitoring, real-time UX, enterprise KB</text>
</svg>
