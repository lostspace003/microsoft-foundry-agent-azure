<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 790" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2E86C1"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1000" height="790" rx="12" fill="#F7F9FB"/>

  <!-- Title -->
  <rect x="0" y="0" width="1000" height="68" rx="12" fill="#1B4F72"/>
